services:
  db:
    # PostGIS + pgvector image only. Schema comes from Django migrations; RO-EDU
    # demo data is loaded by the web service after migrate. See db/README.md.
    build:
      context: .
      dockerfile: Dockerfile.db
    environment:
      POSTGRES_DB: app
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build: .
    command: >
      sh -c "python manage.py migrate &&
             python manage.py load_roedu_seed &&
             python manage.py runserver 0.0.0.0:8000"
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.dev
      DATABASE_URL: postgis://app:app@db:5432/app
      DJANGO_SECRET_KEY: dev-insecure-change-me
      # Where export_agent_snapshot (fanned out by run_due_jobs) writes the public JSON
      # snapshot that the optional agentapi sidecar below reads.
      AGENT_SNAPSHOT_DIR: /app/var/agent_snapshot
    volumes:
      - ./:/app
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  # Optional stdlib-only Go sidecar serving GET /agent/v1/* over the snapshot web writes above.
  # Not started by a plain `docker compose up` — opt in with `--profile agent`.
  agentapi:
    profiles: ["agent"]
    build: services/agentapi
    environment:
      AGENT_SNAPSHOT_DIR: /data/agent_snapshot
      AGENT_API_ADDR: ":8090"
    volumes:
      # Read-only: agentapi only ever reads the snapshot web's export job writes into ./var/.
      - ./var/agent_snapshot:/data/agent_snapshot:ro
    ports:
      - "8090:8090"
    depends_on:
      - web

volumes:
  pgdata: {}
