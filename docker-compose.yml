services:
  db:
    # Seeded PostGIS + pgvector image (extensions + RO-EDU test data baked in) so
    # a fresh volume comes up with data ready. See Dockerfile.db.
    build:
      context: .
      dockerfile: Dockerfile.db
    environment:
      POSTGRES_DB: app
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build: .
    command: >
      sh -c "python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8000"
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.dev
      DATABASE_URL: postgis://app:app@db:5432/app
      DJANGO_SECRET_KEY: dev-insecure-change-me
    volumes:
      - ./:/app
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata: {}
