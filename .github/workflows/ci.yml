name: CI

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    # Daily dependency audit: surfaces a newly-published CVE as its own scheduled-run alert within a
    # day, instead of it first failing an unrelated PR up to a week later. Only the `audit` job runs
    # on schedule (lint-test/docker-build are guarded off).
    - cron: "0 6 * * *"

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-test:
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    services:
      db:
        # Digest-pinned so a future rebuild of the rolling 16-3.5 tag can't change the server
        # minor under us (the 16-3.4 tag did exactly that and broke pg_trgm.so). Refresh the
        # digest deliberately when bumping PostGIS. sha256 = postgis/postgis:16-3.5.
        image: postgis/postgis:16-3.5@sha256:8b33190b6486ab9905dea999171817c1ac461733a7078dd4c836091c6e6b5d40
        env:
          POSTGRES_DB: app
          POSTGRES_USER: app
          POSTGRES_PASSWORD: app
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U app"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10
    env:
      DJANGO_SETTINGS_MODULE: config.settings.test
      DJANGO_SECRET_KEY: ci-secret-not-for-prod
      DATABASE_URL: postgis://app:app@localhost:5432/app
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt
      - name: Install GeoDjango native libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            binutils gdal-bin libgdal-dev libgeos-dev libproj-dev
      - name: Install pgvector into the Postgres service
        # The postgis/postgis image ships PostGIS but not pgvector; the recommendations app's
        # migration runs CREATE EXTENSION vector. Install the PGDG pgvector package into the
        # running service container. HOLD postgresql-16 first so the install can NEVER upgrade the
        # server package (and its pg_trgm.so) out from under the already-running server — that
        # exact mismatch broke every DB test before. The container is matched by image substring so
        # the digest-pinned reference still resolves it.
        run: |
          set -euo pipefail
          CID=$(docker ps --format '{{.ID}} {{.Image}}' | awk '/postgis/{print $1; exit}')
          echo "Postgres service container: $CID"
          docker exec "$CID" bash -lc "apt-get update \
            && apt-mark hold postgresql-16 \
            && apt-get install -y --no-install-recommends postgresql-16-pgvector"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt
      - name: Ruff lint
        run: ruff check .
      - name: Ruff format check
        run: ruff format --check .
      - name: Missing-migrations check
        run: python manage.py makemigrations --check --dry-run
      - name: Tests
        run: pytest -q
      - name: Django deploy checks (prod settings)
        # Boots the production settings module so the fail-closed prod assertions
        # (shared cache + channel layer, real identity provider, EUDI sandbox off) and
        # Django's --deploy security checks are exercised in CI. Uses a dummy REDIS_URL
        # (no connection is made at check time) and the real EUDI provider path.
        env:
          DJANGO_SETTINGS_MODULE: config.settings.prod
          DJANGO_SECRET_KEY: ci-deploy-check-not-a-real-secret-please-rotate-0001
          DJANGO_ALLOWED_HOSTS: example.com
          DATABASE_URL: postgis://app:app@localhost:5432/app
          REDIS_URL: redis://localhost:6379/0
          IDENTITY_PROVIDER: apps.accounts.identity.providers.eudi.EUDIWalletProvider
          EUDI_SANDBOX: "False"
          # A non-empty (dummy) trust anchor so the prod EUDI fail-closed guard passes and the
          # deploy checks can run; check --deploy never verifies a credential, so no real key.
          EUDI_TRUSTED_ISSUERS: '{"https://issuer.example/ci": "ci-deploy-check-dummy-not-a-real-key"}'
        run: |
          pip install channels-redis
          python manage.py check --deploy

  docker-build:
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Build production image
        run: docker build -t social-activities-app:ci .
      - name: Trivy image scan (report-only)
        # Surfaces OS/library CVEs in the built image. Installed via the official script (no
        # third-party action pin to drift) and report-only (--exit-code 0) so a base-image CVE
        # doesn't block the build before it's triaged; flip --exit-code to 1 to enforce once the
        # base image is on a clean cadence. --ignore-unfixed hides CVEs with no available fix.
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh \
            | sh -s -- -b /usr/local/bin
          trivy image --ignore-unfixed --severity CRITICAL,HIGH --exit-code 0 social-activities-app:ci

  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: pip-audit (dependency vulnerabilities)
        # REPORT-ONLY on pull requests (mirrors the report-only Trivy image scan above): a
        # freshly-published CVE in a pinned dep should not block unrelated feature work before it's
        # triaged. It stays ENFORCING on push-to-main and on the daily `schedule` run, so a real
        # CVE still gates the default branch and raises its own scheduled-run alert. Remediation is
        # a deliberate pin bump (Dependabot opens the PR) — see docs/SECURITY.md.
        continue-on-error: ${{ github.event_name == 'pull_request' }}
        run: |
          python -m pip install --upgrade pip pip-audit
          pip-audit -r requirements.txt -r requirements-dev.txt
      - name: Bandit (Python SAST)
        # Static security analysis of our own code. Tuned to high severity + high confidence so it
        # is signal, not noise (the codebase is clean at this level today); blocks on a real finding.
        run: |
          python -m pip install bandit
          bandit -r apps config -q --severity-level high --confidence-level high
