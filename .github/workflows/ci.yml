name: CI

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "0 6 * * 1" # weekly dependency audit (Mon 06:00 UTC)

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-test:
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    services:
      db:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_DB: app
          POSTGRES_USER: app
          POSTGRES_PASSWORD: app
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U app"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10
    env:
      DJANGO_SETTINGS_MODULE: config.settings.test
      DJANGO_SECRET_KEY: ci-secret-not-for-prod
      DATABASE_URL: postgis://app:app@localhost:5432/app
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt
      - name: Install GeoDjango native libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            binutils gdal-bin libgdal-dev libgeos-dev libproj-dev
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt
      - name: Ruff lint
        run: ruff check .
      - name: Ruff format check
        run: ruff format --check .
      - name: Missing-migrations check
        run: python manage.py makemigrations --check --dry-run
      - name: Tests
        run: pytest -q
      # TEMPORARY diagnostic (reverted before merge): on any failure above, re-run
      # the checks, capture output, and post it as a PR comment we can read.
      - name: Diagnostics on failure
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          {
            echo "## ruff check"; ruff check . || true
            echo "## ruff format --check"; ruff format --check . || true
            echo "## makemigrations --check"; python manage.py makemigrations --check --dry-run || true
            echo "## pytest -ra --tb=short"; pytest -q -ra --tb=short || true
          } > ci-diag.txt 2>&1
          python - <<'PY'
          import json, os, urllib.request
          body = open("ci-diag.txt").read()[-58000:]
          payload = json.dumps({"body": "Auto CI diagnostics:\n\n```\n" + body + "\n```"}).encode()
          url = f"https://api.github.com/repos/{os.environ['REPO']}/issues/{os.environ['PR']}/comments"
          req = urllib.request.Request(
              url, data=payload,
              headers={"Authorization": "Bearer " + os.environ["GH_TOKEN"],
                       "Accept": "application/vnd.github+json"},
          )
          print("posted:", urllib.request.urlopen(req).status)
          PY

  docker-build:
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Build production image
        run: docker build -t social-activities-app:ci .

  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: pip-audit (dependency vulnerabilities)
        run: |
          python -m pip install --upgrade pip pip-audit
          pip-audit -r requirements.txt -r requirements-dev.txt
