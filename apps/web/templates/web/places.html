{% extends "base.html" %}
{% block title %}Places{% endblock %}
{% block head %}
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="">
{% endblock %}
{% block content %}
<h1>Places</h1>
<p class="muted">Real locations where activities can happen, from open data. Click a marker to see
  what's on or to organise there.</p>
<div id="map"></div>
{% endblock %}
{% block scripts %}
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
<script>
  const map = L.map('map').setView([46.770, 23.591], 13); // Cluj-Napoca
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom: 19, attribution: '&copy; OpenStreetMap contributors'
  }).addTo(map);
  fetch('/api/places/?page_size=500', {headers: {'Accept': 'application/json'}})
    .then(r => r.json())
    .then(data => {
      const feats = data.features || [];
      const pts = [];
      feats.forEach(f => {
        const c = f.geometry && f.geometry.coordinates;
        if (!c) return;
        const p = f.properties || {};
        const id = f.id;
        const m = L.marker([c[1], c[0]]).addTo(map);
        const name = (p.name || 'Unnamed place');
        const link = document.createElement('a');
        link.href = '/places/' + id + '/';
        link.textContent = 'View & organise →';
        const div = document.createElement('div');
        const strong = document.createElement('strong');
        strong.textContent = name;
        div.appendChild(strong); div.appendChild(document.createElement('br')); div.appendChild(link);
        m.bindPopup(div);
        pts.push([c[1], c[0]]);
      });
      if (pts.length) map.fitBounds(pts, {padding: [30, 30]});
    });
</script>
{% endblock %}
