{% extends "base.html" %}
{% block title %}Log in{% endblock %}
{% block content %}
<h1>Log in</h1>
<form method="post">{% csrf_token %}
  {{ form.as_p }}
  <input type="hidden" name="next" value="{{ next }}">
  <button class="btn" type="submit">Log in</button>
</form>
<p class="muted">No account? <a href="{% url 'register' %}">Sign up</a>.</p>
{% endblock %}
